syntax = "proto3";

option go_package = "omanom.com/bydb/proto";

package bydb;

service ByDb {
	rpc Crud(Command) returns (Response) {}
	rpc Hello(Greeting) returns (Greeting) {}
}

message Greeting {
	string msg = 1;
}

message Response {
	int64 code = 1;
	string document = 2;
}

message Command {
	string raw = 1;
}
