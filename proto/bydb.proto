syntax = "proto3";

option go_package = "omanom.com/bydb/proto";

package bydb;

service ByDb {
	rpc Crud(Command) returns (Response) {}
	rpc Hello(Greeting) returns (Greeting) {}
}

message Greeting {
	string msg = 1;
	string commandlist = 2;
}

message Response {
	uint64 code = 1;
	string document = 2;
	int64 duration = 3;
}

message Command {
	string raw = 1;
}
